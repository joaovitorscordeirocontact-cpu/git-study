<!DOCTYPE html>
<html>
  <head>
    <title>Flexbox practice</title>
  </head>
  <body style="padding-bottom: 1000px;">
    <div style="
      display: flex;
      flex-direction: row;
      ">
      <div style="background-color: aqua;">div 1 text</div>
      <div style="background-color: pink;">div 2 <p>text</p></div>
    </div>

    <div style="
      margin-top: 30px;
      display: flex;
      flex-direction: row;
      ">
      <div style="background-color: aqua;
      width: 100px;
      ">div 1 text</div>
      <div style="background-color: pink;
      flex: 1;
      ">flex 1 <p>text</p></div>
    </div>

    <div style="
      margin-top: 30px;
      height: 70px;
      border-width: 1px;
      border-style: solid;
      border-color: gray;
      display: flex;
      flex-direction: row;
      justify-content: center;
      ">
      <div style="background-color: aqua;
      width: 100px;
      ">200px</div>
      <div style="background-color: pink;
      width: 100px;
      ">100px<p>text</p></div>
      <div style="background-color: aqua;
      width: 100px;
      ">100px</div>
    </div>

    <div style="
      margin-top: 30px;
      height: 70px;
      border-width: 1px;
      border-style: solid;
      border-color: rgb(224, 31, 31);
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      ">
      <div style="background-color: rgb(25, 0, 255);
      width: 100px;
      ">100px</div>
      <div style="background-color: rgb(170, 15, 41);
      width: 100px;
      ">100px<p>text</p></div>
      <div style="background-color: rgb(21, 0, 255);
      width: 100px;
      ">100px</div>
      </div>

      <div style="
      margin-top: 30px;
      height: 70px;
      border-width: 1px;
      border-style: solid;
      border-color: gray;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      ">
      <div style="background-color: aqua;
      width: 100px;
      ">200px</div>
      <div style="background-color: pink;
      width: 100px;
      ">50px</div>
      <div style="background-color: aqua;
      width: 100px;
      ">100px</div>
      </div>
      
  </body>
</html>
